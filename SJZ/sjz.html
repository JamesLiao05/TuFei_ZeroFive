<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>突斐ZeroFive/SJZ</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!-- 返回主页按钮 -->
    <a href="https://tufei05.eu.org" class="home-btn">主页</a>

    <h1 class="page-title">点位</h1>

    <!-- 外层图层容器 -->
    <div class="layer-box">
        <div class="image-grid">
            <div class="image-card">
                <img src="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAEWIrxqPlQGNoJapZ0FKTK31wiWaKv8pgACSCoAAk05-VWAhL7mSxP1aTwE.png" alt="AZ3">
            </div>
        </div>
    </div>

    <!-- 预览弹窗 -->
    <div class="preview-mask" id="mask">
        <span class="close-btn">×</span>
        <span class="arrow prev">←</span>
        <img class="preview-img" id="bigImg" src="" alt="大图预览">
        <span class="arrow next">→</span>
    </div>

    <script src="./main.js"></script>
</body>
</html>
